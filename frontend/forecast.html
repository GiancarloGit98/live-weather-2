<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather 2.0 - Pronóstico</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-storm">
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="assets/bgrain-video.mp4" type="video/mp4">
    </video>
    <div class="container">
        <div class="forecast-box">
            <a href="home.html" class="back-btn-pill">← Volver</a>
            <img src="assets/logo.jpg" alt="Live Weather 2.0" class="logo-small">
            
            <h1>Pronóstico del Clima</h1>
            
            <form id="forecastForm">
                <div class="forecast-inputs">
                    <input type="text" id="cityInput" placeholder="Ingresa una ciudad" required>
                    <input type="date" id="dateInput" required>
                    <button type="submit">Buscar</button>
                </div>
            </form>

            <div id="forecastResult" class="forecast-result hidden">
                <h2 id="cityName"></h2>

                <div class="forecast-summary" id="forecastSummary"></div>

                <div class="slider-label">
                    <span>← Desliza para ver las horas del día →</span>
                </div>
                <div class="hours-slider" id="hoursSlider"></div>

                <div class="hour-detail hidden" id="hourDetail"></div>
            </div>

            <p class="message" id="errorMessage"></p>
        </div>
    </div>

    <script src="js/forecast.js"></script>
</body>
</html>
