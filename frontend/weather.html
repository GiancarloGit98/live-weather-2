<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather 2.0 - Consulta Clima</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-storm">
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="assets/bgsky-video.mp4" type="video/mp4">
    </video>
    <div class="container">
        <div class="weather-box">
            <a href="home.html" class="back-btn-pill">← Volver</a>
            <img src="assets/logo.jpg" alt="Live Weather 2.0" class="logo-small">
            
            <h1>Consulta Clima Actual</h1>
            
            <form id="weatherForm">
                <input type="text" id="cityInput" placeholder="Ingresa una ciudad (ej: Bogotá, Madrid)" required>
                <button type="submit">Buscar</button>
            </form>

            <div id="weatherResult" class="weather-result hidden">
                <div class="weather-header">
                    <h2 id="cityName"></h2>
                    <div class="weather-datetime">
                        <span id="weatherDay"></span>
                        <span id="weatherDate"></span>
                        <span id="weatherTime"></span>
                    </div>
                </div>

                <div class="weather-main">
                    <div class="weather-icon" id="weatherIcon">🌤️</div>
                    <div class="weather-temp-block">
                        <div class="temperature" id="temperature"></div>
                        <div class="apparent-temp">Sensación: <span id="apparentTemp"></span></div>
                    </div>
                </div>

                <div class="weather-grid">
                    <div class="weather-card">
                        <span class="card-icon">💧</span>
                        <span class="card-label">Humedad</span>
                        <span class="card-value" id="humidity"></span>
                    </div>
                    <div class="weather-card">
                        <span class="card-icon">💨</span>
                        <span class="card-label">Viento</span>
                        <span class="card-value" id="windSpeed"></span>
                        <span class="card-sub" id="windDirection"></span>
                    </div>
                    <div class="weather-card">
                        <span class="card-icon">☀️</span>
                        <span class="card-label">Índice UV</span>
                        <span class="card-value" id="uvIndex"></span>
                        <span class="card-sub" id="uvLabel"></span>
                    </div>
                    <div class="weather-card">
                        <span class="card-icon">🌧️</span>
                        <span class="card-label">Precipitación</span>
                        <span class="card-value" id="precipitation"></span>
                    </div>
                    <div class="weather-card">
                        <span class="card-icon">🔵</span>
                        <span class="card-label">Presión</span>
                        <span class="card-value" id="pressure"></span>
                    </div>
                    <div class="weather-card">
                        <span class="card-icon">🕐</span>
                        <span class="card-label">Actualizado</span>
                        <span class="card-value" id="updateTime"></span>
                    </div>
                </div>
                <button id="addFavBtn" class="add-fav-btn" onclick="addToFavorites()">⭐ Agregar a Favoritos</button>
                <p class="message" id="favMessage"></p>
            </div>

            <p class="message" id="errorMessage"></p>
        </div>
    </div>

    <script src="js/weather.js"></script>
</body>
</html>
