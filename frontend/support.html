<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather 2.0 - Servicio al Cliente</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-sky">
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="assets/bgstorm-video.mp4" type="video/mp4">
    </video>
    <div class="container">
        <div class="support-box">
            <a href="home.html" class="back-btn-pill">← Volver</a>
            <img src="assets/logo.jpg" alt="Live Weather 2.0" class="logo-small">
            
            <h1>Servicio al Cliente</h1>
            <p class="subtitle">Envíanos tus peticiones, quejas o reclamos</p>
            
            <form id="supportForm">
                <div class="form-group">
                    <label for="phone">Teléfono de contacto</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="Ej: 3001234567" 
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="supportMessage">Mensaje</label>
                    <textarea 
                        id="supportMessage" 
                        rows="6" 
                        placeholder="Describe tu solicitud aquí..." 
                        required
                    ></textarea>
                </div>
                
                <button type="submit">Enviar Solicitud</button>
            </form>

            <p class="message" id="statusMessage"></p>

            <div class="tickets-section">
                <h2>Mis Solicitudes</h2>
                <div id="ticketsList" class="tickets-list"></div>
            </div>
        </div>
    </div>

    <script src="js/support.js"></script>
</body>
</html>
